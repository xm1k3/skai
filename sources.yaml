# Default skai sources configuration.
#
# skai init downloads this file and writes it to ~/.skai/sources.yaml.
# You can also copy it there manually, or edit ~/.skai/sources.yaml directly.
#
# Each source is a git repository that skai clones and scans for SKILL.md
# folders. Set enabled: false to skip a source without removing it.

sources:
  - name: composio-awesome-claude-skills
    repo: https://github.com/ComposioHQ/awesome-claude-skills
    enabled: true
  - name: sickn33-antigravity-awesome-skills
    repo: https://github.com/sickn33/antigravity-awesome-skills
    enabled: true
  - name: alirezarezvani-claude-skills
    repo: https://github.com/alirezarezvani/claude-skills
    enabled: true
  - name: behisecc-awesome-claude-skills
    repo: https://github.com/BehiSecc/awesome-claude-skills
    enabled: true
  - name: travisvn-awesome-claude-skills
    repo: https://github.com/travisvn/awesome-claude-skills
    enabled: true
